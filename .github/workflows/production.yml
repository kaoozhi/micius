name: Production

on:
  push:
    branches:
      - main
      - "dev/*"
    paths:
      - "storage-engine/**"
      - "proto/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/production.yml"
  pull_request:
    branches:
      - main
    paths:
      - "storage-engine/**"
      - "proto/**"
      - "Dockerfile"
      - "docker-compose.yml"

jobs:
  # ── Docker build ──────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (with GHA cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: micius-storage-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Docker smoke test ─────────────────────────────────────────────────────────
  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: micius-storage-engine:smoke
          cache-from: type=gha

      - name: Start container
        run: |
          docker run -d \
            --name micius-smoke \
            -p 50051:50051 \
            -e MICIUS_WAL_DIR=/tmp/wal \
            -e MICIUS_CHUNK_DIR=/tmp/chunks \
            -e MICIUS_INDEX_PATH=/tmp/index.bin \
            -e RUST_LOG=storage_engine=info \
            micius-storage-engine:smoke

      - name: Wait for gRPC port to be ready
        run: |
          for i in $(seq 1 15); do
            if bash -c 'echo > /dev/tcp/localhost/50051' 2>/dev/null; then
              echo "Port 50051 is ready"
              exit 0
            fi
            echo "Waiting ($i/15)..."
            sleep 1
          done
          echo "Timed out waiting for port 50051"
          docker logs micius-smoke
          exit 1

      - name: Install grpcurl
        run: go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest

      - name: Smoke test — Append RPC returns sequence > 0
        run: |
          RESPONSE=$(grpcurl -plaintext \
            -import-path proto \
            -proto proto/storage/v1/storage.proto \
            -d '{"points":[{"metric_name":"smoke","tags":{"host":"ci"},"timestamp_ns":1000000000,"value":1.0}]}' \
            localhost:50051 \
            storage.v1.StorageService/Append)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"sequence"' \
            || (echo "FAIL: no sequence field in response" && exit 1)

      - name: Show container logs on failure
        if: failure()
        run: docker logs micius-smoke

      - name: Stop and remove container
        if: always()
        run: docker rm -f micius-smoke 2>/dev/null || true
